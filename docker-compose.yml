services:
  php:
    build:
      context: ./docker/php/
      dockerfile: Dockerfile
    container_name: demo_a_php
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/var/www/demo_a/backend
      - ./logs/php:/var/log/php
    networks:
      - demo_a_network
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 1m30s
      timeout: 30s
      start_period: 30s
      retries: 5

  nginx:
    image: nginx:1.24-alpine
    container_name: demo_a_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/demo_a/backend
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - demo_a_network
    depends_on:
      - php
      - mysql
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 30s

  mysql:
    image: mysql:8.0
    container_name: demo_a_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - demo_a_network

networks:
  demo_a_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
